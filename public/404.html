<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prem Palanisamy - Backend Software Engineer</title>
  <meta name="description" content="Backend Software Engineer with 3.5+ years at Oracle. Expert in Spring Boot, microservices, and distributed systems.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- GitHub Pages SPA redirect -->
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <!-- Loading message for users with JavaScript disabled -->
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: 'JetBrains Mono', monospace; background: #0a0a0a; color: #00ff00; min-height: 100vh;">
      <h1 style="color: #00ff00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);">Prem Palanisamy</h1>
      <p style="color: #0096ff;">Backend Software Engineer</p>
      <p style="color: #e2e8f0;">Please enable JavaScript to view this portfolio.</p>
    </div>
  </noscript>
</body>
</html>
